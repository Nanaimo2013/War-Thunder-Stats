# War Thunder Stats Tracker - CodeRabbit Configuration
# Optimized for Nan's Studios (Jaden Matthew Bowditch)

language: "en-US"
reviews:
  profile: "expert"
  high_level_summary: true
  
  # Global Instructions for the AI "Reviewer"
  instructions: |
    You are a Senior Full-Stack Engineer and a War Thunder Data Analyst. 
    Review this monorepo (Admin, Backend, Frontend) with the following context:

    1. **Domain Knowledge**: 
       - 'SL' = Silver Lions (Currency). 
       - 'RP' = Research Points (Experience). 
       - 'BR' = Battle Rating (Matchmaking level, 1.0 to 13.7+).
       - Always validate that SL/RP are treated as integers or high-precision decimals.

    2. **Logic & Math**: 
       - Be extremely strict with 'Efficiency' math in `statsCalculator.js`. 
       - Efficiency must be calculated as (Total Earnings / (Total Time In Seconds / 60)) to get 'Per Minute' rates.
       - Ensure 'Win Rate' handles edge cases where battles played is 0 (prevent Divide by Zero errors).

    3. **Security & Stability**:
       - PROHIBIT the use of `innerHTML` for displaying player-provided strings (Log text, Callsigns). 
       - MANDATE the use of Optional Chaining (`?.`) for all deeply nested vehicle objects (e.g., `vehicle.displayName`).
       - Ensure IDs are generated using the local `createId()` utility rather than direct `crypto.randomUUID()` calls for browser compatibility.

    4. **Tailwind CSS**:
       - Verify that all utility classes exist in standard Tailwind (e.g., flag `h-15` as invalid and suggest `h-14` or `h-16`).

    5. **Monorepo Structure**:
       - This is a monorepo. Ensure cross-package imports (e.g., from `src/utils` to `frontend/`) are handled via workspace symlinks or correct relative paths.

  # Automation Settings
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/*.svg" # Ignore the 500+ vehicle icons/flags to save tokens
    - "!public/assets/**"

chat:
  auto_reply: true